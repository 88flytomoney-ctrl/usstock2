name: Daily Pipeline — Scrape + Prices + AI + Deploy

on:
  schedule:
    # Run daily at 06:00 HKT (22:00 UTC) Tue–Sat
    - cron: '0 22 * * 2-6'
  workflow_dispatch:  # Manual trigger
  push:
    branches: [main]

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Data Layer ──────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install requests openai yfinance pandas openpyxl -q

      - name: Scrape ETNet + Fetch prices + AI predictions
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: python generate_predictions.py

      - name: Verify outputs
        run: |
          python -c "
          import json
          pred=json.load(open('public/data/predictions.json'))
          stocks=pred.get('stocks',{})
          indices=pred.get('indices',{})
          print(f'predictions.json: {len(stocks)} stocks, {len(indices)} indices')
          for code, v in list(stocks.items())[:3]:
              combined=v['combined_data']
              actuals=[r for r in combined if not r.get('is_predicted')]
              predicted=[r for r in combined if r.get('is_predicted')]
              print(f'  {code} ({v[\"name\"]}): {len(combined)} rows ({len(actuals)} actual, {len(predicted)} predicted)')
          if indices:
              for k,v in indices.items():
                  print(f'  {v[\"name\"]}: {v[\"value\"]} ({v[\"pct\"]:+.2f}%)')
          ai=[c for c,v in stocks.items() if v.get('has_ai')]
          print(f'Stocks with AI predictions: {len(ai)}')
          "

      # Data is written to public/data/ by the Python script.
      # Commit it back to the repo so history is persisted on GitHub Pages.
      - name: Commit data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/
          git diff --staged --quiet && echo "No data changes" || {
            git commit -m "🤖 Auto-update US stock data $(date +%Y-%m-%d\ %H:%M)" &&
            git pull --rebase && git push
          }

      # ── Frontend Build ───────────────────────────────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
